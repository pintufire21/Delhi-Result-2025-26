<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delhi Result 2025-26</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 20px;
    width: 350px;
    border: 1px solid #ccc;
    border-radius: 5px;
}
h2 {
    text-align: center;
    font-size: 15px;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    border: 1px solid #ccc;
}
.captcha {
    font-size: 26px;
    color: blue;
    text-align: center;
    font-weight: bold;
}
button {
    background: #2e6da4;
    color: white;
    padding: 8px;
    border: none;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
    <h2>
    Directorate of Education, Govt. of NCT of Delhi<br>
    Annual Result Academic Session 2025-26
    </h2>

    <label>Student Id *</label>
    <input type="text" id="studentId">

    <label>Class *</label>
    <select id="class">
        <option>Select</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>11</option>
    </select>

    <label>Section *</label>
    <select>
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
        <option>E</option>
        <option>F</option>
    </select>

    <label>DOB *</label>
    <input type="text" id="dob" placeholder="dd/mm/yyyy">

    <div class="captcha" id="captcha"></div>

    <label>Type The Code</label>
    <input type="text" id="captchaInput">

    <button onclick="checkData()">Submit</button>
</div>

<script>

// 🔥 SET YOUR TARGET (edit this)
const correctStudentId = "20220225681";
const correctDOB = "07/11/2010";
const correctClass = "9";

// Generate random captcha
function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let code = "";
    for(let i=0; i<6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("captcha").innerText = code;
}

generateCaptcha();

function checkData() {
    let id = document.getElementById("studentId").value;
    let dob = document.getElementById("dob").value;
    let cls = document.getElementById("class").value;
    let captcha = document.getElementById("captcha").innerText;
    let userCaptcha = document.getElementById("captchaInput").value;

    if(userCaptcha !== captcha) {
        alert("❌ Wrong CAPTCHA!");
        generateCaptcha();
        return;
    }

    if(id === correctStudentId && dob === correctDOB && cls === correctClass) {
        // 👉 REDIRECT TO NEXT PAGE (you'll send image later)
        window.location.href = "result.html";
    } else {
        alert("⚠️ Invalid Details! Try Again.");
    }
}

</script>

</body>
</html>
