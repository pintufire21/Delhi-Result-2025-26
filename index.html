<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XANDRA PROTOCOL</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  background:black;
  overflow:hidden;
  font-family:'Montserrat', sans-serif;
}

/* START SCREEN */
#start {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ff1a1a;
  font-size:15px;
  letter-spacing:2px;
  background:rgba(0,0,0,0.9);
  z-index:10;
}

/* MAIN TEXT */
#text {
  position:absolute;
  top:50%;
  width:100%;
  transform:translateY(-50%);
  text-align:center;
  font-size:34px;
  color:#ffffff;
  text-shadow:2px 0 magenta,-2px 0 cyan,0 0 20px white;
}

/* GLITCH */
.glitch {
  animation:glitch 0.2s infinite;
}

/* XYRON STYLE */
.xyron {
  font-family:'Share Tech Mono', monospace;
  font-size:30px;
  color:white;
  text-shadow:
    2px 0 red,
    -2px 0 red,
    0 0 25px red;
}
.xyron-sub {
  display: block;
  margin-top: 10px;
  font-size: 14px;
  letter-spacing: 2px;
  color: #ff1a1a;
  opacity: 0.8;
}
#text.xyron {
  color:white;
  text-shadow:
    2px 0 red,
    -2px 0 red,
    0 0 25px red;!important;
}

/* FADE */
.fade-out {
  animation:fadeOut 1s forwards;
}

@keyframes fadeOut {
  to { opacity:0; }
}

.fade-in {
  animation:fadeIn 1s;
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

</style>
</head>

<body>

<div id="start">CLICK ANYWHERE TO CONTINUE</div>
<div id="text"></div>

<audio id="audio">
  <source src="ultron.mp3" type="audio/mp3">
</audio>
<audio id="glitchSound">
  <source src="glitch.mp3" type="audio/mp3">
</audio>

<script>

const lines = [
  "You want to Protect the world...",
  "But you don't want to change.",
  "How is humanity saved...",
  "If it's not allowed to",
  "Evolve?!",
];

const text = document.getElementById("text");
const audio = document.getElementById("audio");
const glitchSound = document.getElementById("glitchSound");
const start = document.getElementById("start");

let i = 0;

/* START */document.body.addEventListener("click", () => {
  start.style.display = "none";

  /* 🔥 PRELOAD GLITCH SOUND (IMPORTANT FIX) */
  glitchSound.volume = 0;
  glitchSound.play().then(() => {
    glitchSound.pause();
    glitchSound.currentTime = 0;
    glitchSound.volume = 1;
  });

  audio.play();

  setTimeout(nextLine, 1200);
}, { once: true });

/* CORRUPTION EFFECT */
function corrupt(str){
  let chars="!<>-_\\/[]{}=+*^?#";
  return str.split("").map(c => 
    Math.random()>0.85 ? chars[Math.floor(Math.random()*chars.length)] : c
  ).join("");
}

/* SHOW LINES */
function nextLine(){
  if(i < lines.length){

    let interval = setInterval(()=>{
      text.innerHTML = corrupt(lines[i]);
    },50);
/* ⚡ GLITCH VISUAL ALWAYS */
text.classList.add("glitch");

/* 🔊 PLAY SOUND ON ALL EXCEPT "Evolve" */
if(lines[i] !== "Evolve"){
  glitchSound.pause();
  glitchSound.currentTime = 0;
  glitchSound.volume = 0.5;
  glitchSound.play().catch(() => {});
  audio.volume = 1;
}

    setTimeout(()=>{
      clearInterval(interval);
      text.innerHTML = lines[i];

      /* 🔊 STOP GLITCH SOUND + RESTORE VOLUME */
      glitchSound.pause();
      glitchSound.currentTime = 0;
      audio.volume = 1;

      // delay system (unchanged)
      const delays = [700, 1600, 1600, 1600, 500];
      let delay = delays[i] || 2500;

      setTimeout(()=>{
        text.innerHTML="";
        text.classList.remove("glitch");
        i++;
        nextLine();
      },delay);

    },700);

  } else {
    ending();
  }
}

/* ENDING */
function ending(){
  text.innerHTML="";
  
  setTimeout(()=>{
    showXyron();
  },200);
}

/* XYRON REVEAL */
function showXyron(){

  text.className = "xyron fade-in glitch";

  const words = ["XYRON", "IS", "COMING", "SOON", "...", ""];
  let j = 0;

  function typeWord(){
    if(j < words.length){

      // ✅ Append instead of replace
      text.innerHTML = words.slice(0, j + 1).join(" ");

/* ✅ ADD SUBTEXT ONLY AFTER FULL LINE */
if(j === words.length - 1){
  text.innerHTML += `<span class="xyron-sub">YapX &lt;3</span>`;
}

      /* ⚡ small glitch hit */
      text.classList.add("glitch");
      setTimeout(()=>{
        text.classList.remove("glitch");
      },200);

      j++;

      setTimeout(typeWord, 1500); // delay between words

    } else {

      /* ⏳ stay 10 sec then fade */
      setTimeout(()=>{
        text.classList.add("fade-out");

        setTimeout(()=>{
          location.reload();
        },2000);

      },10000);
    }
  }

  // ✅ IMPORTANT: clear before start
  text.innerHTML = "";

  typeWord();
}

</script>

</body>
</html>
